<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation API - ProsArtisan IA</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Swagger UI Styles from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
  
  <style>
    :root {
      --bg-dark: #0b0f19;
      --panel-dark: #111827;
      --accent-blue: #3b82f6;
      --accent-blue-glow: rgba(59, 130, 246, 0.15);
      --accent-cyan: #06b6d4;
      --text-white: #f3f4f6;
      --text-gray: #94a3b8;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
    }

    /* Premium Top Header */
    .docs-header {
      background-color: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px border rgba(255, 255, 255, 0.1);
      padding: 1rem 2rem;
      display: flex;
      justify-between: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .docs-logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .docs-logo span {
      background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-white);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .back-btn:hover {
      background: rgba(59, 130, 246, 0.15);
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px var(--accent-blue-glow);
    }

    /* Swagger Custom Dark Styling Wrappers */
    .swagger-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      background: var(--panel-dark);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      overflow: hidden;
    }

    /* Customizing Swagger UI Internal styles for premium dark mode look */
    .swagger-ui {
      filter: invert(0.9) hue-rotate(180deg); /* High performance dark conversion */
    }

    .swagger-ui .info {
      margin: 30px 0 !important;
    }

    .swagger-ui .info .title {
      color: #000 !important;
    }

    .swagger-ui .info p, 
    .swagger-ui .info li, 
    .swagger-ui .info table {
      color: #333 !important;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .swagger-ui .scheme-container {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-bottom: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .swagger-ui .opblock {
      border-radius: 10px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important;
    }

    /* Invert back code snippets and payloads so they read standard dark mode */
    .swagger-ui .model-box,
    .swagger-ui pre,
    .swagger-ui code,
    .swagger-ui .responses-table,
    .swagger-ui .parameter__name,
    .swagger-ui .parameter__type {
      filter: invert(1) hue-rotate(180deg);
    }

    .swagger-ui pre.microlight {
      background: #1e293b !important;
      color: #f8fafc !important;
      border-radius: 8px;
    }

    /* Glowing decorative backgrounds */
    .glow-bg {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.04) 0%, rgba(0,0,0,0) 70%);
      top: 20%;
      left: 10%;
      pointer-events: none;
      z-index: -1;
    }
    .glow-bg-2 {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.03) 0%, rgba(0,0,0,0) 70%);
      bottom: 10%;
      right: 5%;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>
  <div class="glow-bg-2"></div>

  <!-- Header -->
  <header class="docs-header">
    <div class="docs-logo">
      🛡️ Pros<span>Artisan IA</span>
    </div>
    <div style="display: flex; gap: 10px;">
      <a href="/client" class="back-btn">Espace Client</a>
      <a href="/index.html" class="back-btn">Portail Expert &larr;</a>
    </div>
  </header>

  <!-- Container for Swagger UI -->
  <div class="swagger-container">
    <div id="swagger-ui"></div>
  </div>

  <!-- Swagger UI Scripts -->
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      // Build a system
      const ui = SwaggerUIBundle({
        url: "/openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "BaseLayout",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        docExpansion: "list"
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
