<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Comptes Google</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f0f4f9;
    }
    .google-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 450px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="google-card p-10 flex flex-col items-center">
    <!-- Google Logo (SVG) -->
    <svg class="w-16 h-16 mb-4" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
    </svg>

    <h2 class="text-[24px] font-normal text-[#1f1f1f] text-center mb-1">Choisissez un compte</h2>
    <p class="text-[16px] text-[#4f4f4f] text-center mb-6">pour continuer vers <span class="font-medium text-[#1a73e8]">ProsArtisan IA</span></p>

    <!-- Accounts List -->
    <div class="w-full space-y-1 mb-6">
      
      <!-- Account 1 -->
      <button onclick="selectAccount('jean.macon@gmail.com')" class="w-full flex items-center p-3 rounded-lg hover:bg-[#f7f9fc] active:bg-[#edf2fa] transition duration-150 border-b border-[#f1f1f1] text-left">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg mr-3">
          J
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[14px] font-medium text-[#1f1f1f]">Jean Maçon</div>
          <div class="text-[12px] text-[#5f6368] truncate">jean.macon@gmail.com</div>
        </div>
      </button>

      <!-- Account 2 -->
      <button onclick="selectAccount('expert.btp@gmail.com')" class="w-full flex items-center p-3 rounded-lg hover:bg-[#f7f9fc] active:bg-[#edf2fa] transition duration-150 border-b border-[#f1f1f1] text-left">
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-700 font-bold text-lg mr-3">
          E
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[14px] font-medium text-[#1f1f1f]">Expert Technique BTP</div>
          <div class="text-[12px] text-[#5f6368] truncate">expert.btp@gmail.com</div>
        </div>
      </button>

      <!-- Account 3 -->
      <button onclick="selectAccount('admin@prosartisan.ci')" class="w-full flex items-center p-3 rounded-lg hover:bg-[#f7f9fc] active:bg-[#edf2fa] transition duration-150 border-b border-[#f1f1f1] text-left">
        <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-lg mr-3">
          A
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[14px] font-medium text-[#1f1f1f]">Administrateur ProsArtisan</div>
          <div class="text-[12px] text-[#5f6368] truncate">admin@prosartisan.ci</div>
        </div>
      </button>

      <!-- Custom Account Form (hidden by default) -->
      <div id="custom-account-box" class="hidden p-3 bg-[#f7f9fc] border border-blue-200 rounded-xl mt-3 space-y-3">
        <div class="text-xs font-semibold text-[#1f1f1f]">Saisir un autre compte Google</div>
        <input type="email" id="custom-email" placeholder="votre.email@gmail.com" 
               class="w-full p-2 border border-gray-300 rounded text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        <div class="flex justify-end space-x-2">
          <button onclick="toggleCustomForm(false)" class="text-xs text-gray-500 hover:underline px-2 py-1">Annuler</button>
          <button onclick="submitCustomEmail()" class="text-xs bg-blue-600 text-white rounded px-3 py-1 font-semibold hover:bg-blue-700 transition">Continuer</button>
        </div>
      </div>

      <!-- Use another account trigger -->
      <button id="btn-use-other" onclick="toggleCustomForm(true)" class="w-full flex items-center p-3 rounded-lg hover:bg-[#f7f9fc] transition duration-150 text-left">
        <div class="w-10 h-10 rounded-full border border-gray-300 flex items-center justify-center text-gray-600 text-xl mr-3 font-semibold">
          👤
        </div>
        <div class="text-[14px] font-medium text-[#1a73e8]">Utiliser un autre compte</div>
      </button>

    </div>

    <div class="text-xs text-[#5f6368] text-center leading-relaxed">
      Pour continuer, Google partagera votre nom, votre adresse e-mail, votre préférence linguistique et votre photo de profil avec ProsArtisan IA.
    </div>
  </div>

  <script>
    function selectAccount(email) {
      // Generate a mock OAuth2 authentication code
      const rand = Math.floor(Math.random() * 1000000);
      const code = "MOCK_AUTH_" + rand;
      
      // Redirect back to login page
      const redirect = new URLSearchParams(window.location.search).get("redirect");
      let url = `/login.html?code=${code}&email=${encodeURIComponent(email)}`;
      if (redirect) {
        url += `&redirect=${encodeURIComponent(redirect)}`;
      }
      window.location.href = url;
    }

    function toggleCustomForm(show) {
      const box = document.getElementById("custom-account-box");
      const btn = document.getElementById("btn-use-other");
      if (show) {
        box.classList.remove("hidden");
        btn.classList.add("hidden");
        document.getElementById("custom-email").focus();
      } else {
        box.classList.add("hidden");
        btn.classList.remove("hidden");
      }
    }

    function submitCustomEmail() {
      const email = document.getElementById("custom-email").value.trim();
      if (!email || !email.includes("@")) {
        alert("Veuillez saisir une adresse e-mail valide.");
        return;
      }
      selectAccount(email);
    }
  </script>
</body>
</html>
